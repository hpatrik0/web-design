<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
    <head>
        <meta charset="UTF-8">
        <title>Администраторска страница - Аутори</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body id="admin_autor">
        
        <nav class="navbar">
            <ul>
                <li><a href="katalogKnjiga.html">Почетна</a></li>
                <li><a href="autori.html">Аутори</a></li>
                <li><a href="autor_admin.html">Админ: Аутори</a></li>
                <li><a href="adminKnjige.html">Админ: Књиге</a></li>

            </ul>
        </nav>

        <h3 class="title">Администраторска страница - Аутори</h3>
        <table id="admin_table" class="admin-lista">
            <tr class="list-head">
                <th style="width: 40px;">
                    <button class="delete-selected-btn" title="Обриши означене">🗑️</button>
                </th>
                <th>Име</th>
                <th>Презиме</th>
                <th>Биографија</th>
                <th>Слике</th>
                <th>Датум рођења</th>
                <th>Статус</th>
                <th>Број освојених награда</th>
                <th>Број продатих примерака</th>
                <th>Контакт телефон менаџера</th>
                <th style="width: 60px;">
                    <button id="openAddModal" class="add-btn" title="Додај аутора">+</button>
                </th>
            </tr>
        </table>
 
        <hr>


        <form class="admin-forma" id="dodavanje-autora">
            <h3 class="title" style="border-top: 0;">Додавање аутора</h3>
            <hr style="margin: 0; border-bottom: 2px solid black;">
            <p>
                <label for="name">Име: </label>
                <input type="text" id="name" name="ime">
            </p>
            <p>
                <label for="name">Презиме: </label>
                <input type="text" id="surname" name="prezime">
            </p>
            <p>
                <label for="name">Биографија: </label>
                <textarea style="max-width: 250px; max-height: 100px;"></textarea>
            </p>
            <p>
                <label for="picture">Слика: </label>
                <input type="file" id="picture" name="slika">
            </p>
            <p>
                <label for="dob">Датум рођења: </label>
                <input type="date" id="dob" name="datum-rodjenja">
            </p>
            <p>
                <label for="status">Статус: </label>
                <select name="status" id="status">
                    <option value="aktivan">Активан</option>
                    <option value="preminuo">Преминуо</option>
                    <option value="u-penziji">У пензији</option>
                </select>
            </p>
            <p>
                <label for="num-awards">Број освојених награда: </label>
                <input type="number" id="num-awards" name="br-nagrada">
            </p>
            <p>
                <label for="num-sales">Број продатих примерака: </label>
                <input type="number" id="num-sales" name="br-prodatih">
            </p>
            <p>
                <label for="phone-num">Број телефона менаџера: </label>
                <input type="phone-num" id="phone-num" name="br-telefona">
            </p>
            
            
            <section style="text-align: center; padding-bottom: 10px;">
                <button type="submit">Додај аутора</button>
                <button type="reset">Поништи</button>
            </section>
            
        </form>

        <form class="admin-forma" id="izmena-autora">
            <h3 class="title" style="border-top: 0;">Измена аутора</h3>
            <hr style="margin: 0; border-bottom: 2px solid black;">

            <p>Изаберите аутора за измењивање: 
                <select>
                    <option value="autor-1">Аутор 1</option>
                </select>
            </p>
            <hr>

            <p>
                <label for="name">Име: </label>
                <input type="text" id="name" name="ime" value="Аутор">
            </p>
            <p>
                <label for="name">Презиме: </label>
                <input type="text" id="surname" name="prezime" value="Ауторовић">
            </p>
            <p>
                <label for="name">Биографија: </label>
                <textarea style="max-width: 250px; max-height: 100px;">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Odit vel dolor harum minus modi? Sint doloremque fugit exercitationem assumenda, suscipit corporis qui officiis quisquam vero voluptates? Repellendus magnam omnis ullam.</textarea>
            </p>
            <p>
                <label for="picture">Слика: </label>
                <input type="file" id="picture" name="slika" style="color: transparent;">
            </p>
            <p>
                <label for="dob">Датум рођења: </label>
                <input type="date" id="dob" name="datum-rodjenja" value="1971-01-01">
            </p>
            <p>
                <label for="status">Статус: </label>
                <select name="status" id="status" value="aktivan">
                    <option value="aktivan">Активан</option>
                    <option value="preminuo">Преминуо</option>
                    <option value="u-penziji">У пензији</option>
                </select>
            </p>
            <p>
                <label for="num-awards">Број освојених награда: </label>
                <input type="number" id="num-awards" name="br-nagrada" value="3">
            </p>
            <p>
                <label for="num-sales">Број продатих примерака: </label>
                <input type="number" id="num-sales" name="br-prodatih" value="3000">
            </p>
            <p>
                <label for="phone-num">Број телефона менаџера: </label>
                <input type="phone-num" id="phone-num" name="br-telefona" value="+381661234567">
            </p>
            
            
            <section style="text-align: center; padding-bottom: 10px;">
                <button type="submit">Измени аутора</button>
                <button type="reset">Поништи</button>
            </section>
            
        </form>

        <template id="table_row_template">
            <tr class="table-element">
                <td><input type="checkbox" style="width: 18px; height: 18px;"></td>
                <td id="ime">Аутор 1</td>
                <td id="prezime">Ауторовић 1</td>
                <td id="biografija" class="admin-bio">Lorem ipsum dolor sit amet consectetur adipisicing elit. Natus laudantium aliquid itaque quibusdam accusantium molestias sequi nobis aspernatur, praesentium dolorem, repellendus aut repudiandae aperiam iusto similique culpa voluptatibus! At, atque?</td>
                <td><img id="slika" alt="Slika 1" src="default_pfp.png" width="50"></td>
                <td id="rodjendan">01/01/1971</td>
                <td id="status">Активан</td>
                <td id="br_nagrada">3</td>
                <td id="br_primeraka">3000</td>
                <td id="kontakt">+381661234567</td>
                <td style="text-align: center;">
                    <button class="edit-btn" title="Измени аутора">✏️</button>
                </td>
            </tr>
        </template>

        <div class="modal-overlay" id="addModal">
            <div class="modal admin-forma">
                <button id="closeModal">&times;</button>
                <h3 class="title" style="border-top:0;">Додавање аутора</h3>
                <hr style="margin:0; border-bottom:2px solid black;">
                <form id="dodavanje-autora-modal">
                    <p>
                        <label for="name">Име: </label>
                        <input type="text" id="name" name="ime">
                    </p>
                    <p>
                        <label for="name">Презиме: </label>
                        <input type="text" id="surname" name="prezime">
                    </p>
                    <p>
                        <label for="name">Биографија: </label>
                        <textarea style="max-width: 250px; max-height: 100px;"></textarea>
                    </p>
                    <p>
                        <label for="picture">Слика: </label>
                        <input type="file" id="picture" name="slika">
                    </p>
                    <p>
                        <label for="dob">Датум рођења: </label>
                        <input type="date" id="dob" name="datum-rodjenja">
                    </p>
                    <p>
                        <label for="status">Статус: </label>
                        <select name="status" id="status">
                            <option value="aktivan">Активан</option>
                            <option value="preminuo">Преминуо</option>
                            <option value="u-penziji">У пензији</option>
                        </select>
                    </p>
                    <p>
                        <label for="num-awards">Број освојених награда: </label>
                        <input type="number" id="num-awards" name="br-nagrada">
                    </p>
                    <p>
                        <label for="num-sales">Број продатих примерака: </label>
                        <input type="number" id="num-sales" name="br-prodatih">
                    </p>
                    <p>
                        <label for="phone-num">Број телефона менаџера: </label>
                        <input type="phone-num" id="phone-num" name="br-telefona">
                    </p>
                    <section style="text-align:center; padding-bottom:10px;">
                        <button type="submit">Додај аутора</button>
                        <button type="reset">Поништи</button>
                    </section>
                </form>
            </div>
        </div>
        <script type="module" src="src/index.js"></script>
    </body>
</html>
