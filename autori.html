<html>
    <head>
        <title>Аутори</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body id="lista_autora">
        <nav class="navbar">
            <ul>
                <li><a href="katalogKnjiga.html">Почетна</a></li>
                <li><a href="autori.html">Аутори</a></li>
                <li><a href="autor_admin.html">Админ: Аутори</a></li>
                <li><a href="adminKnjige.html">Админ: Књиге</a></li>
                <li style="margin-left: auto;">
                    <button id="openAuthModal" class="nav-link-btn">Prijava</button>
                </li>   

            </ul>
        </nav>

        <h2 class="title">Листа аутора</h2>
        <div id="autor-grid" class="autor-grid">
        </div>

        <template id="autor_slot_template">
            <a href="autor.html">
                <div class="autor">
                    <img id="slika" alt="Autor 1" src="default_pfp.png">
                    <label id="ime">Аутор 1</label>
                </div>
            </a>
        </template>

        <div class="modal-overlay" id="authModal">
            <div class="modal" style="background:#fff;"> 
                <button class="close-modal">&times;</button>

                <div style="display:flex; margin-bottom:20px; border-bottom:2px solid #ccc;">
                    <button id="loginTab"
                            style="flex:1; padding:10px; border:none; background:none;
                                font-weight:bold; border-bottom:2px solid #007bff; color:#007bff;">
                        Prijava
                    </button>
                    <button id="registerTab"
                            style="flex:1; padding:10px; border:none; background:none;">
                        Registracija
                    </button>
                </div>

                <form id="loginForm" novalidate>
                    <input type="email" placeholder="Email" required
                        style="display:block; width:100%; margin-bottom:10px; padding:8px;">
                    <input type="password" placeholder="Lozinka" required minlength="6"
                        style="display:block; width:100%; margin-bottom:10px; padding:8px;">
                    <button type="submit"
                            style="display:block; width:100%; padding:10px;">Prijavi se</button>
                </form>

                <form id="registerForm" novalidate style="display:none;">
                    <input type="text" placeholder="Ime" required
                        style="display:block; width:100%; margin-bottom:10px; padding:8px;">
                    <input type="text" placeholder="Prezime" required
                        style="display:block; width:100%; margin-bottom:10px; padding:8px;">
                    <input type="text" placeholder="Ulica" required
                        style="display:block; width:100%; margin-bottom:10px; padding:8px;">
                    <input type="email" placeholder="Email" required
                        style="display:block; width:100%; margin-bottom:10px; padding:8px;">
                    <input type="password" placeholder="Lozinka" required minlength="6"
                        style="display:block; width:100%; margin-bottom:10px; padding:8px;">
                    <input type="tel" placeholder="Telefon (+381...)" required
                        pattern="[\+\d][\d\s]{7,}"
                        style="display:block; width:100%; margin-bottom:10px; padding:8px;">
                    <button type="submit"
                            style="display:block; width:100%; padding:10px;">Registruj se</button>
                </form>
            </div>
        </div>

        <script type="module" src="src/index.js"></script>
    </body>
</html>
