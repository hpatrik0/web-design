<!DOCTYPE html>
<html lang="sr-Cyrl-RS">
<head>
  <meta charset="UTF-8">
  <title>Аутори</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="stylesheet" href="src/css/autori.css">
</head>
<body id="lista_autora">

  <!-- Navbar placeholder (injected by navbar.js) -->
  <div id="navbar"></div>

  <h2 class="title">Листа аутора</h2>

  <!-- Search bar -->
    <div class="filter-bar">
    <input type="text" id="authorSearch" placeholder="Претражи по имену...">
    <select id="statusFilter">
        <option value="">Сви статуси</option>
        <option value="Активан">Активан</option>
        <option value="Преминуо">Преминуо</option>
        <option value="У пензији">У пензији</option>
    </select>
    </div>

  <!-- Author cards container -->
  <div id="autor-grid" class="autor-grid"></div>

  <!-- Template for a single author card -->
  <template id="autor_slot_template">
    <a href="autor.html">
      <div class="autor">
        <img id="slika" alt="Autor" src="src/assets/default_pfp.png">
        <label id="ime">Аутор</label>
      </div>
    </a>
  </template>

  <!-- Auth modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal" style="background:#fff;">
      <div style="display:flex; margin-bottom:20px; border-bottom:2px solid #ccc;">
        <button id="loginTab"
                style="flex:1; padding:10px; border:none; background:none;
                    font-weight:bold; border-bottom:2px solid #007bff; color:#007bff;">
          Prijava
        </button>
        <button id="registerTab"
                style="flex:1; padding:10px; border:none; background:none;">
          Registracija
        </button>
      </div>
      <form id="loginForm" novalidate>
        <input type="email" placeholder="Email" required
               style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="password" placeholder="Lozinka" required minlength="6"
               style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <button type="submit"
                style="display:block; width:100%; padding:10px;">Prijavi se</button>
      </form>
      <form id="registerForm" novalidate style="display:none;">
        <input type="text" placeholder="Ime" required
               style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" placeholder="Prezime" required
               style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" placeholder="Ulica" required
               style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="email" placeholder="Email" required
               style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="password" placeholder="Lozinka" required minlength="6"
               style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="tel" placeholder="Telefon (+381...)" required
               pattern="[\+\d][\d\s]{7,}"
               style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <button type="submit"
                style="display:block; width:100%; padding:10px;">Registruj se</button>
      </form>
    </div>
  </div>

  <script src="src/scripts/navbar.js"></script>
  <script type="module" src="src/scripts/autori.js"></script>
</body>
</html>
